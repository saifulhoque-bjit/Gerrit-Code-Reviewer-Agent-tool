<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects — Gerrit AI Reviewer</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      margin-top: 8px;
    }
    .project-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px 20px 18px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .project-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(79,142,247,0.12);
    }
    .project-card-icon { font-size: 28px; }
    .project-card-name {
      font-size: 15px;
      font-weight: 700;
      word-break: break-all;
      line-height: 1.4;
    }
    .project-card-meta {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .project-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 4px;
    }
    .rules-badge {
      font-size: 11px;
      padding: 2px 9px;
      border-radius: 10px;
      font-weight: 600;
    }
    .rules-loaded  { background: rgba(61,220,132,0.15); color: var(--green); }
    .rules-missing { background: rgba(136,146,164,0.12); color: var(--muted); }
    .open-arrow { color: var(--muted); font-size: 18px; }
    .bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 36px;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.3px;
      z-index: 100;
    }
    .bottom-bar strong { color: var(--text); }
    body { padding-bottom: 44px; }
  </style>
</head>
<body>

<nav class="topnav">
  <div class="topnav-brand">
    <span>🤖</span> Gerrit AI Code Reviewer
  </div>
  <div class="topnav-right">
    <span class="user-badge" id="userBadge">…</span>
    <button class="btn btn-ghost" onclick="openSettings()">⚙️ Settings</button>
    <button class="btn btn-ghost" onclick="logout()">Sign Out</button>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <h2>Projects</h2>
    <p>Select a project to browse its open commits</p>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="num" id="statProjects">—</div><div class="label">Projects</div></div>
    <div class="stat-card"><div class="num" id="statTotal">—</div><div class="label">Open Changes</div></div>
    <div class="stat-card"><div class="num" id="statRules">—</div><div class="label">Projects with Rules</div></div>
  </div>

  <input class="search-bar" id="searchBar" type="text"
    placeholder="🔍 Search projects…" oninput="filterProjects()" />

  <div id="projectsContainer">
    <div class="loading">
      <div class="spinner"></div>
      <p style="margin-top:12px;color:var(--muted)">Loading projects from Gerrit…</p>
    </div>
  </div>
</div>

<div id="toastContainer" class="toast-container"></div>

<script>
const PROXY = 'http://localhost:7474/api';
let allProjects = [];     // [{name, count, rulesCount}]
let rulesMap = {};        // project -> rulesCount (from server)

function getAuth() {
  const a = sessionStorage.getItem('auth');
  if (!a) { window.location.href = 'index.html'; return null; }
  return a;
}
function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function showToast(msg, type='success') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span>${type==='success'?'✅':'❌'}</span> ${msg}`;
  c.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

async function loadAll() {
  const auth = getAuth(); if (!auth) return;
  document.getElementById('userBadge').textContent =
    sessionStorage.getItem('display_name') || sessionStorage.getItem('username') || '?';

  try {
    // Fetch ALL projects from Gerrit directly (paginate if needed)
    let allProjectNames = [];
    let skip = 0;
    while (true) {
      const projUrl = `${PROXY}/a/projects/?type=CODE&n=500&S=${skip}`;
      const projR = await fetch(projUrl, { headers: { Authorization: auth } });
      if (!projR.ok) {
        if (projR.status === 401) { window.location.href = 'index.html'; return; }
        throw new Error(`HTTP ${projR.status}`);
      }
      const projData = await projR.json();
      const batch = Object.keys(projData).filter(n => projData[n].state !== 'HIDDEN');
      allProjectNames = allProjectNames.concat(batch);
      // Gerrit sets _more_projects flag when there are more results
      if (!projData._more_projects || batch.length === 0) break;
      skip += 500;
    }
    allProjectNames.sort();

    // Fetch open change counts in parallel (best-effort — failures show 0)
    const openCountMap = {};
    const changesUrl = `${PROXY}/a/changes/?q=status:open&n=500&o=LABELS`;
    try {
      const chR = await fetch(changesUrl, { headers: { Authorization: auth } });
      if (chR.ok) {
        const changes = await chR.json();
        for (const c of changes) {
          openCountMap[c.project] = (openCountMap[c.project] || 0) + 1;
        }
      }
    } catch {}

    // Fetch rules info for all projects in parallel
    const rulesResults = await Promise.all(allProjectNames.map(p =>
      fetch(`/rules/list/${encodeURIComponent(projectSlug(p))}`)
        .then(r => r.ok ? r.json() : { files: [] })
        .catch(() => ({ files: [] }))
    ));
    rulesResults.forEach((res, i) => { rulesMap[allProjectNames[i]] = res.files.length; });

    allProjects = allProjectNames.map(name => ({
      name,
      count: openCountMap[name] || 0,
      rulesCount: rulesMap[name] || 0
    }));

    renderProjects(allProjects);

  } catch (err) {
    document.getElementById('projectsContainer').innerHTML =
      `<div class="empty-state"><div class="icon">⚠️</div><p>Error: ${escHtml(err.message)}</p></div>`;
    showToast('Failed to load: ' + err.message, 'error');
  }
}

function projectSlug(name) {
  // Safe filesystem slug: replace / and special chars with _
  return name.replace(/[^a-zA-Z0-9._-]/g, '_');
}

function filterProjects() {
  const q = document.getElementById('searchBar').value.toLowerCase();
  renderProjects(q ? allProjects.filter(p => p.name.toLowerCase().includes(q)) : allProjects);
}

function renderProjects(projects) {
  document.getElementById('statProjects').textContent = projects.length;
  document.getElementById('statTotal').textContent = projects.reduce((s,p)=>s+p.count,0);
  document.getElementById('statRules').textContent = projects.filter(p=>p.rulesCount>0).length;

  const container = document.getElementById('projectsContainer');
  if (!projects.length) {
    container.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>No projects found.</p></div>`;
    return;
  }

  window._projectMap = {};
  container.innerHTML = `<div class="projects-grid">${projects.map((p, i) => {
    window._projectMap[i] = p;
    return `
    <div class="project-card" onclick="openProject(${i})">
      <div class="project-card-icon">📁</div>
      <div class="project-card-name">${escHtml(p.name)}</div>
      <div class="project-card-meta">
        <span>📋 ${p.count} open commit${p.count!==1?'s':''}</span>
      </div>
      <div class="project-card-footer">
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          <span class="rules-badge ${p.rulesCount>0 ? 'rules-loaded':'rules-missing'}">
            ${p.rulesCount>0 ? `✅ ${p.rulesCount} rule${p.rulesCount>1?'s':''}` : '⚪ No rules'}
          </span>
          <span class="rules-badge" id="ctx-badge-${i}" style="background:rgba(136,146,164,0.12);color:var(--muted)">⏳</span>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          <span class="open-arrow">›</span>
        </div>
      </div>
    </div>`;
  }).join('')}</div>`;

  // Load project analysis status for each project
  projects.forEach((p, i) => {
    loadProjectStatus(projectSlug(p.name), i);
  });
}

function openProject(i) {
  const p = window._projectMap[i];
  if (!p) return;
  sessionStorage.setItem('current_project', p.name);
  sessionStorage.setItem('current_project_slug', projectSlug(p.name));
  window.location.href = 'commits.html';
}

async function loadProjectStatus(slug, i) {
  const badge = document.getElementById('ctx-badge-' + i);
  if (!badge) return;
  try {
    const r = await fetch(`/projects/status/${encodeURIComponent(slug)}`);
    if (!r.ok) { badge.textContent = '⚪'; return; }
    const data = await r.json();
    if (data.indexing) {
      badge.textContent = '🔄 Indexing…';
      badge.style.background = 'rgba(79,142,247,0.15)';
      badge.style.color = 'var(--accent)';
      // Poll until done
      setTimeout(() => loadProjectStatus(slug, i), 5000);
    } else if (data.indexed) {
      badge.textContent = '🧠 Analyzed';
      badge.style.background = 'rgba(61,220,132,0.15)';
      badge.style.color = 'var(--green)';
    } else if (data.cloned) {
      badge.textContent = '📁 Cloned';
      badge.style.background = 'rgba(79,142,247,0.12)';
      badge.style.color = 'var(--accent)';
    } else {
      badge.textContent = '⚪ No context';
    }
    if (data.error) {
      badge.textContent = '⚠️ Error';
      badge.style.background = 'rgba(255,95,87,0.12)';
      badge.style.color = 'var(--red)';
      badge.title = data.error;
    }
  } catch { badge.textContent = '⚪'; }
}

async function startAnalyze(slug, i) {
  // Prompt for git URL if not already configured
  let gitUrl = '';
  try {
    const statusR = await fetch(`/projects/status/${encodeURIComponent(slug)}`);
    if (statusR.ok) {
      const status = await statusR.json();
      gitUrl = status.config?.git_url || '';
    }
  } catch {}

  if (!gitUrl) {
    gitUrl = prompt(`Enter Git URL for project "${slug}":\\n(e.g. https://review2.bjitgroup.com/a/project-name)`);
    if (!gitUrl) return;
  }

  try {
    const cloneR = await fetch(`/projects/clone/${encodeURIComponent(slug)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ git_url: gitUrl })
    });
    const cloneData = await cloneR.json();
    if (cloneData.error) throw new Error(cloneData.error);
    showToast(`Cloning ${slug}… Analysis will start automatically after clone.`);
  } catch (err) {
    showToast('Failed: ' + err.message, 'error');
  }
}

loadAll();

// Settings modal
function openSettings() { window._settingsModal ? window._settingsModal.style.display='flex' : createSettingsModal(); }

function createSettingsModal() {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:9999';
  overlay.onclick = e => { if (e.target === overlay) overlay.style.display = 'none'; };

  const enabled = localStorage.getItem('auto_analyze_enabled') !== 'false';
  overlay.innerHTML = `
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:28px 32px;max-width:420px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.4)">
      <h3 style="margin:0 0 20px;font-size:17px">⚙️ Global Settings</h3>
      <label style="display:flex;align-items:center;gap:12px;cursor:pointer;font-size:14px">
        <input type="checkbox" id="toggleAutoAnalyze" ${enabled ? 'checked' : ''} style="width:18px;height:18px;cursor:pointer">
        <div>
          <div style="font-weight:600">🧠 Codebase Analysis</div>
          <div style="font-size:12px;color:var(--muted);margin-top:3px">Clone + index repos for better AI review context</div>
        </div>
      </label>
      <div style="margin-top:24px;text-align:right">
        <button onclick="this.closest('div[style*=fixed]').style.display='none'" style="background:var(--accent);color:white;border:none;border-radius:8px;padding:8px 20px;font-size:13px;font-weight:600;cursor:pointer">Done</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  window._settingsModal = overlay;

  document.getElementById('toggleAutoAnalyze').onchange = function() {
    localStorage.setItem('auto_analyze_enabled', this.checked ? 'true' : 'false');
    showToast(this.checked ? '🧠 Analysis enabled' : '🧠 Analysis disabled');
  };
}
</script>
<footer class="bottom-bar">
  Created by <strong>Gazi Md Saiful Hoque</strong> &nbsp;|&nbsp; Team: PC Application
</footer>
</body>
</html>
