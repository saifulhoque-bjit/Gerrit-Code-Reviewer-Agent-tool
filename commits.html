<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commits — Gerrit AI Reviewer</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Rules toolbar ──────────────────────────────── */
    .rules-toolbar {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    .rules-toolbar-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
    }
    .rules-files-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      flex: 1;
      min-width: 0;
    }
    .rules-file-chip {
      background: rgba(61,220,132,0.1);
      border: 1px solid rgba(61,220,132,0.3);
      color: var(--green);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .rules-empty-hint {
      font-size: 12px;
      color: var(--muted);
    }
    #rulesFileInput { display: none; }
    .btn-rules-browse {
      background: var(--bg3);
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .btn-rules-browse:hover { background: rgba(79,142,247,0.1); }
    .btn-rules-load {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    .btn-rules-load:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-rules-load:not(:disabled):hover { opacity: 0.88; }
    .btn-rules-clear {
      background: rgba(255,95,87,0.12);
      border: 1px solid rgba(255,95,87,0.4);
      color: var(--red);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-rules-clear:hover { background: rgba(255,95,87,0.2); }
    .rules-status-badge {
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 12px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .rules-active   { background: rgba(61,220,132,0.15); color: var(--green); }
    .rules-inactive { background: rgba(136,146,164,0.12); color: var(--muted); }
    /* Skill generation progress bar */
    .skill-progress-wrap {
      display: none;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
      width: 100%;
    }
    .skill-progress-wrap.visible { display: flex; }
    .skill-progress-bar-outer {
      flex: 1;
      height: 6px;
      background: var(--bg3);
      border-radius: 4px;
      overflow: hidden;
    }
    .skill-progress-bar-inner {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), #a78bfa);
      border-radius: 4px;
      transition: width 0.4s ease;
      animation: skillPulse 1.4s ease-in-out infinite;
    }
    @keyframes skillPulse {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.55; }
    }
    .skill-progress-label {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }
    .skill-ready-badge {
      font-size: 11px;
      padding: 2px 9px;
      border-radius: 10px;
      font-weight: 600;
      background: rgba(167,139,250,0.15);
      color: #a78bfa;
      display: none;
    }
    .skill-ready-badge.visible { display: inline-block; }

    /* ── Commits list ───────────────────────────────── */
    .commits-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .commit-list { display: flex; flex-direction: column; gap: 8px; }
    .commit-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
      cursor: pointer;
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      align-items: center;
      gap: 16px;
      transition: background 0.15s, border-color 0.15s;
    }
    .commit-card:hover { background: var(--bg3); border-color: var(--accent); }
    .commit-subject { font-size: 14px; font-weight: 500; }
    .commit-meta    { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .commit-num     { font-size: 12px; color: var(--muted); font-family: monospace; }
    .commit-branch  { background: var(--bg3); color: var(--accent); padding: 1px 6px; border-radius: 4px; font-size: 11px; font-family: monospace; }
  </style>
</head>
<body>

<nav class="topnav">
  <div class="topnav-brand">
    <span>🤖</span> Gerrit AI Code Reviewer
  </div>
  <div class="topnav-right">
    <a href="projects.html" class="btn btn-ghost">← Projects</a>
    <button class="btn btn-ghost" onclick="openSettings()">⚙️ Settings</button>
    <span class="user-badge" id="userBadge">…</span>
    <button class="btn btn-ghost" onclick="logout()">Sign Out</button>
  </div>
</nav>

<div class="page">

  <!-- Project title -->
  <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
    <div>
      <h2 id="projectTitle">Loading…</h2>
      <p id="projectSub"></p>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <span class="rules-badge" id="analyzeStatusBadge" style="font-size:12px;padding:4px 12px">⏳</span>
      <button class="btn btn-primary" id="analyzeBtn" onclick="startAnalyze()" style="font-size:13px;padding:8px 18px">
        🧠 Analyze
      </button>
    </div>
  </div>

  <!-- Rules toolbar -->
  <div class="rules-toolbar" id="rulesToolbar">
    <span class="rules-toolbar-label">📜 Review Rules:</span>

    <!-- Loaded rules chips OR hint -->
    <div class="rules-files-list" id="rulesFilesList">
      <span class="rules-empty-hint">No rules loaded — reviewer uses default analysis</span>
    </div>

    <!-- Status badge -->
    <span class="rules-status-badge rules-inactive" id="rulesStatusBadge">⚪ No Rules</span>

    <!-- Hidden file input -->
    <input type="file" id="rulesFileInput" multiple accept=".txt,.md,.text" onchange="onFilesSelected(this)">

    <!-- Browse button -->
    <button class="btn-rules-browse" onclick="document.getElementById('rulesFileInput').click()">
      📂 Browse Files
    </button>

    <!-- Load Rules button — disabled until files selected -->
    <button class="btn-rules-load" id="loadRulesBtn" disabled onclick="loadRules()">
      ⬆️ Load Rules
    </button>

    <!-- Clear button — shown only when rules are loaded -->
    <button class="btn-rules-clear" id="clearRulesBtn" style="display:none" onclick="clearRules()">
      🗑 Clear Rules
    </button>

    <!-- Skill generation progress -->
    <div class="skill-progress-wrap" id="skillProgressWrap" style="width:100%">
      <span class="skill-progress-label">🧠 Generating skill…</span>
      <div class="skill-progress-bar-outer">
        <div class="skill-progress-bar-inner" id="skillProgressBar"></div>
      </div>
    </div>
    <span class="skill-ready-badge" id="skillReadyBadge">🧠 Skill Ready</span>
  </div>

  <!-- Search + commit count -->
  <div class="commits-header">
    <input class="search-bar" id="searchBar" type="text"
      placeholder="🔍 Search commits…" oninput="filterCommits()" style="margin:0">
    <span id="commitCount" style="font-size:13px;color:var(--muted)"></span>
  </div>

  <!-- Commits list -->
  <div id="commitsContainer">
    <div class="loading">
      <div class="spinner"></div>
      <p style="margin-top:12px;color:var(--muted)">Loading commits…</p>
    </div>
  </div>
</div>

<div id="toastContainer" class="toast-container"></div>

<script>
const PROXY = 'http://localhost:7474/api';
let allCommits = [];
let pendingFiles = [];   // File objects selected but not yet uploaded
let currentProjectSlug = '';
let currentProject = '';

function getAuth() {
  const a = sessionStorage.getItem('auth');
  if (!a) { window.location.href = 'index.html'; return null; }
  return a;
}
function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showToast(msg, type='success') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span>${type==='success'?'✅':'❌'}</span> ${msg}`;
  c.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}
function daysSince(d) { return Math.floor((Date.now()-new Date(d).getTime())/86400000); }

async function init() {
  currentProject     = sessionStorage.getItem('current_project') || '';
  currentProjectSlug = sessionStorage.getItem('current_project_slug') || '';
  if (!currentProject) { window.location.href = 'projects.html'; return; }
  if (!getAuth()) return;

  document.getElementById('userBadge').textContent =
    sessionStorage.getItem('display_name') || sessionStorage.getItem('username') || '?';
  document.getElementById('projectTitle').textContent = currentProject;
  document.getElementById('projectSub').textContent   = `Project: ${currentProject}`;

  await Promise.all([loadCommits(), refreshRulesStatus(), loadAnalyzeStatus()]);
}

// ── Commits ──────────────────────────────────────────────────
async function loadCommits() {
  const auth = getAuth();
  try {
    const enc = encodeURIComponent(`project:${currentProject} status:open`);
    const url = `${PROXY}/a/changes/?q=${enc}&n=200&o=CURRENT_REVISION&o=DETAILED_ACCOUNTS&o=CURRENT_COMMIT`;
    const r = await fetch(url, { headers: { Authorization: auth } });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    allCommits = await r.json();
    renderCommits(allCommits);
  } catch (err) {
    document.getElementById('commitsContainer').innerHTML =
      `<div class="empty-state"><div class="icon">⚠️</div><p>${escHtml(err.message)}</p></div>`;
  }
}

function filterCommits() {
  const q = document.getElementById('searchBar').value.toLowerCase();
  renderCommits(q ? allCommits.filter(c =>
    (c.subject||'').toLowerCase().includes(q) ||
    ((c.owner?.display_name||c.owner?.name||'')).toLowerCase().includes(q)
  ) : allCommits);
}

function renderCommits(commits) {
  document.getElementById('commitCount').textContent =
    `${commits.length} commit${commits.length!==1?'s':''}`;

  const container = document.getElementById('commitsContainer');
  if (!commits.length) {
    container.innerHTML = `<div class="empty-state"><div class="icon">🎉</div><p>No open changes in this project.</p></div>`;
    return;
  }

  window._commitMap = {};
  container.innerHTML = `<div class="commit-list">${commits.map((c, i) => {
    window._commitMap[i] = c;
    const owner = c.owner?.display_name || c.owner?.name || c.owner?.username || 'Unknown';
    const days  = daysSince(c.created);
    const age   = days === 0 ? 'Today' : days === 1 ? '1 day ago' : `${days} days ago`;
    return `
    <div class="commit-card" onclick="openCommit(${i})">
      <div>
        <div class="commit-subject">${escHtml(c.subject||'(no subject)')}</div>
        <div class="commit-meta">by <strong>${escHtml(owner)}</strong> · ${age} · <span class="commit-branch">${escHtml(c.branch||'')}</span></div>
      </div>
      <div class="commit-num">#${c._number}</div>
      <div><span class="badge badge-open">OPEN</span></div>
      <div style="color:var(--muted);font-size:18px">›</div>
    </div>`;
  }).join('')}</div>`;
}

function openCommit(i) {
  const c = window._commitMap[i];
  if (!c) return;
  sessionStorage.setItem('current_change_id',  c.change_id);
  sessionStorage.setItem('current_change_num', c._number);
  sessionStorage.setItem('current_subject',    c.subject || '');
  sessionStorage.setItem('current_branch',     c.branch || '');
  sessionStorage.setItem('current_author',     c.owner?.display_name || c.owner?.name || c.owner?.username || '');
  // project + slug already in sessionStorage
  window.location.href = 'review.html';
}

// ── Rules management ─────────────────────────────────────────
function onFilesSelected(input) {
  pendingFiles = Array.from(input.files);
  const btn = document.getElementById('loadRulesBtn');
  if (pendingFiles.length > 0) {
    btn.disabled = false;
    btn.textContent = `⬆️ Load ${pendingFiles.length} File${pendingFiles.length>1?'s':''}`;
  } else {
    btn.disabled = true;
    btn.textContent = '⬆️ Load Rules';
  }
}

async function loadRules() {
  if (!pendingFiles.length) return;
  const btn = document.getElementById('loadRulesBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Uploading…';

  try {
    const fd = new FormData();
    for (const f of pendingFiles) fd.append('files', f);
    fd.append('project_slug', currentProjectSlug);

    const r = await fetch('/rules/upload', { method: 'POST', body: fd });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const res = await r.json();
    showToast(`✅ Loaded ${res.saved} rules file${res.saved!==1?'s':''} for "${currentProject}"`);
  } catch (err) {
    showToast('Failed to upload rules: ' + err.message, 'error');
  } finally {
    pendingFiles = [];
    document.getElementById('rulesFileInput').value = '';
    btn.textContent = '⬆️ Load Rules';
    btn.disabled = true;
    await refreshRulesStatus();
  }
}

async function clearRules() {
  if (!confirm(`Clear ALL rules for "${currentProject}"? This cannot be undone.`)) return;
  try {
    const r = await fetch(`/rules/clear/${encodeURIComponent(currentProjectSlug)}`, { method: 'POST' });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    showToast(`🗑 Rules cleared for "${currentProject}"`);
    await refreshRulesStatus();
  } catch (err) {
    showToast('Failed to clear rules: ' + err.message, 'error');
  }
}

async function refreshRulesStatus() {
  try {
    const r = await fetch(`/rules/list/${encodeURIComponent(currentProjectSlug)}`);
    const data = r.ok ? await r.json() : { files: [], skill_ready: false };
    const files = (data.files || []).filter(f => !f.startsWith('_'));

    const list      = document.getElementById('rulesFilesList');
    const badge     = document.getElementById('rulesStatusBadge');
    const clearBtn  = document.getElementById('clearRulesBtn');
    const skillBadge = document.getElementById('skillReadyBadge');
    const skillWrap  = document.getElementById('skillProgressWrap');

    if (files.length) {
      list.innerHTML = files.map(f =>
        `<span class="rules-file-chip">📄 ${escHtml(f)}</span>`).join('');
      badge.textContent = `✅ ${files.length} rule${files.length>1?'s':''} active`;
      badge.className = 'rules-status-badge rules-active';
      clearBtn.style.display = '';
    } else {
      list.innerHTML = `<span class="rules-empty-hint">No rules loaded — reviewer uses default analysis</span>`;
      badge.textContent = '⚪ No Rules';
      badge.className = 'rules-status-badge rules-inactive';
      clearBtn.style.display = 'none';
      skillBadge.classList.remove('visible');
      skillWrap.classList.remove('visible');
    }

    // Skill ready state
    if (data.skill_ready) {
      skillWrap.classList.remove('visible');
      skillBadge.classList.add('visible');
    } else if (files.length) {
      // Files exist but skill not ready — show progress bar and start polling
      skillBadge.classList.remove('visible');
      skillWrap.classList.add('visible');
      startSkillPolling();
    }
  } catch(e) { /* silent */ }
}

let _skillPollTimer = null;
let _skillPollProgress = 0;

function startSkillPolling() {
  if (_skillPollTimer) return; // already polling
  _skillPollProgress = 5;
  const bar = document.getElementById('skillProgressBar');
  if (bar) bar.style.width = _skillPollProgress + '%';

  _skillPollTimer = setInterval(async () => {
    // Animate progress bar (fake fill — never reaches 100% until done)
    _skillPollProgress = Math.min(_skillPollProgress + Math.random() * 8, 88);
    if (bar) bar.style.width = _skillPollProgress + '%';

    try {
      const r = await fetch(`/rules/compress-status/${encodeURIComponent(currentProjectSlug)}`);
      const data = r.ok ? await r.json() : {};
      if (data.skill_ready) {
        // Done — fill bar, swap to badge
        if (bar) bar.style.width = '100%';
        setTimeout(() => {
          clearInterval(_skillPollTimer);
          _skillPollTimer = null;
          document.getElementById('skillProgressWrap').classList.remove('visible');
          document.getElementById('skillReadyBadge').classList.add('visible');
          showToast('🧠 Skill generated — compressed rules active for next review!');
        }, 500);
      }
    } catch(e) { /* keep polling */ }
  }, 2500);
}

// ── Codebase Analysis ────────────────────────────────────────
async function loadAnalyzeStatus() {
  const badge = document.getElementById('analyzeStatusBadge');
  const btn = document.getElementById('analyzeBtn');
  if (!badge || !currentProjectSlug) return;
  try {
    const r = await fetch(`/projects/status/${encodeURIComponent(currentProjectSlug)}`);
    if (!r.ok) { badge.textContent = '⚪'; return; }
    const data = await r.json();

    // Error takes priority — show it and stop polling
    if (data.error) {
      badge.textContent = '⚠️ Error';
      badge.style.background = 'rgba(255,95,87,0.12)';
      badge.style.color = 'var(--red)';
      badge.title = data.error;
      badge.style.cursor = 'pointer';
      badge.onclick = () => showToast('❌ ' + data.error, 'error');
      if (btn) { btn.disabled = false; btn.textContent = '🧠 Retry'; }
      showToast('Analysis error: ' + data.error, 'error');
      return;
    }

    if (data.indexing) {
      badge.textContent = '🔄 Analyzing…';
      badge.style.background = 'rgba(79,142,247,0.15)';
      badge.style.color = 'var(--accent)';
      badge.onclick = null;
      if (btn) { btn.disabled = true; btn.textContent = '🔄 Analyzing…'; }
      setTimeout(loadAnalyzeStatus, 5000);
    } else if (data.indexed) {
      badge.textContent = '🧠 Analyzed';
      badge.style.background = 'rgba(61,220,132,0.15)';
      badge.style.color = 'var(--green)';
      badge.onclick = null;
      if (btn) { btn.disabled = false; btn.textContent = '🧠 Re-analyze'; }
    } else if (data.cloned) {
      badge.textContent = '📁 Cloned (not analyzed)';
      badge.style.background = 'rgba(79,142,247,0.12)';
      badge.style.color = 'var(--accent)';
      badge.onclick = null;
      if (btn) { btn.disabled = false; btn.textContent = '🧠 Analyze'; }
    } else {
      badge.textContent = '⚪ Not set up';
      badge.onclick = null;
      if (btn) { btn.disabled = false; btn.textContent = '🧠 Analyze'; }
    }
  } catch { badge.textContent = '⚪'; }
}

async function startAnalyze() {
  const btn = document.getElementById('analyzeBtn');
  if (!currentProjectSlug) return;
  const auth = getAuth();

  // Build git URL automatically from Gerrit host + project name
  const gitUrl = `https://review2.bjitgroup.com:8443/a/${currentProject}`;

  // Check if already cloned — skip straight to branch picker
  try {
    const statusR = await fetch(`/projects/status/${encodeURIComponent(currentProjectSlug)}`);
    if (statusR.ok) {
      const s = await statusR.json();
      if (s.cloned) {
        await showBranchPicker(auth);
        return;
      }
    }
  } catch {}

  if (btn) { btn.disabled = true; btn.textContent = '🔄 Cloning…'; }
  updateAnalyzeBadge('cloning');

  try {
    const cloneR = await fetch(`/projects/clone/${encodeURIComponent(currentProjectSlug)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': auth },
      body: JSON.stringify({ git_url: gitUrl, project: currentProject })
    });
    const cloneData = await cloneR.json();
    if (cloneData.error) throw new Error(cloneData.error);
    showToast(`Cloning ${currentProject}… Please wait.`);
    pollUntilCloned(auth);
  } catch (err) {
    if (btn) { btn.disabled = false; btn.textContent = '🧠 Analyze'; }
    updateAnalyzeBadge('error', err.message);
    showToast('Failed: ' + err.message, 'error');
  }
}

async function pollUntilCloned(auth) {
  const btn = document.getElementById('analyzeBtn');
  try {
    const r = await fetch(`/projects/status/${encodeURIComponent(currentProjectSlug)}`);
    if (!r.ok) { setTimeout(() => pollUntilCloned(auth), 3000); return; }
    const data = await r.json();
    if (data.error) {
      if (btn) { btn.disabled = false; btn.textContent = '🧠 Analyze'; }
      updateAnalyzeBadge('error', data.error);
      showToast('Clone failed: ' + data.error, 'error');
      return;
    }
    // Show live status on button while cloning
    const msg = data.status_msg || '';
    if (btn && !data.clone_done) {
      btn.textContent = msg ? `🔄 ${msg}` : '🔄 Cloning…';
    }
    if (data.clone_done || data.cloned) {
      if (btn) { btn.disabled = false; btn.textContent = '🧠 Analyze'; }
      showToast(`✅ ${currentProject} cloned — select a branch to analyze.`);
      await showBranchPicker(auth);
    } else {
      setTimeout(() => pollUntilCloned(auth), 3000);
    }
  } catch { setTimeout(() => pollUntilCloned(auth), 3000); }
}

async function showBranchPicker(auth) {
  // Show modal immediately with a spinner while fetching branches
  const overlay = document.createElement('div');
  overlay.id = 'branchPickerOverlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.65);display:flex;align-items:center;justify-content:center;z-index:9999';
  overlay.innerHTML = `
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:28px 32px;max-width:460px;width:92%;box-shadow:0 20px 60px rgba(0,0,0,0.5)">
      <h3 style="margin:0 0 6px;font-size:17px">🌿 Select Branch to Analyze</h3>
      <p style="margin:0 0 20px;font-size:13px;color:var(--muted)">${currentProject}</p>
      <div id="branchPickerBody" style="display:flex;flex-direction:column;align-items:center;gap:12px;padding:16px 0">
        <div class="spinner" style="width:32px;height:32px;border-width:3px"></div>
        <span style="font-size:13px;color:var(--muted)">Fetching branch list…</span>
      </div>
      <div style="display:flex;justify-content:flex-end;margin-top:20px">
        <button id="branchCancelBtn" style="background:var(--bg3);color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:8px 18px;font-size:13px;cursor:pointer">Cancel</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById('branchCancelBtn').onclick = () => overlay.remove();

  // Fetch branches
  let branches = [];
  try {
    const r = await fetch(`/projects/branches/${encodeURIComponent(currentProjectSlug)}`, {
      headers: { 'Authorization': auth }
    });
    if (r.ok) {
      const data = await r.json();
      branches = data.branches || [];
    }
  } catch {}

  // Overlay was cancelled while loading
  if (!document.getElementById('branchPickerOverlay')) return;

  if (!branches.length) {
    overlay.remove();
    showToast('Could not fetch branch list — starting analysis on current branch.', 'error');
    await startIndexing('master', auth);
    return;
  }

  // Swap spinner for branch list
  const preferred = ['main', 'master', 'develop', 'development', 'dev'];
  const defaultBranch = preferred.find(b => branches.includes(b)) || branches[0];

  document.getElementById('branchPickerBody').innerHTML = `
    <div style="display:flex;flex-direction:column;gap:6px;max-height:320px;overflow-y:auto;padding-right:4px;width:100%">
      ${branches.map(b => `
        <label style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;border:1px solid var(--border);background:${b === defaultBranch ? 'rgba(79,142,247,0.08)' : ''}">
          <input type="radio" name="branchPick" value="${b}" ${b === defaultBranch ? 'checked' : ''} style="accent-color:var(--accent)">
          <span style="font-size:13px;font-family:monospace">${b}</span>
          ${b === defaultBranch ? '<span style="margin-left:auto;font-size:11px;color:var(--accent);font-weight:600">default</span>' : ''}
        </label>`).join('')}
    </div>`;

  // Swap subtitle
  overlay.querySelector('p').textContent = `${currentProject} — ${branches.length} branch${branches.length !== 1 ? 'es' : ''} found`;

  // Add Analyze button
  const footer = overlay.querySelector('div[style*="justify-content:flex-end"]');
  const okBtn = document.createElement('button');
  okBtn.id = 'branchOkBtn';
  okBtn.style.cssText = 'background:var(--accent);color:white;border:none;border-radius:8px;padding:8px 22px;font-size:13px;font-weight:600;cursor:pointer';
  okBtn.textContent = '🧠 Analyze';
  footer.insertBefore(okBtn, footer.firstChild);

    okBtn.onclick = async () => {
    const picked = overlay.querySelector('input[name="branchPick"]:checked');
    if (!picked) return;
    const pickedBranch = picked.value;

    // Replace modal content with live status card
    const card = overlay.querySelector('div[style*="border-radius:16px"]');
    card.innerHTML = `
      <h3 style="margin:0 0 6px;font-size:17px" id="analyzeDialogTitle">⏳ Preparing…</h3>
      <p style="margin:0 0 20px;font-size:13px;color:var(--muted)">${currentProject}</p>
      <div style="display:flex;flex-direction:column;align-items:center;gap:14px;padding:8px 0 16px">
        <div class="spinner" style="width:40px;height:40px;border-width:4px"></div>
        <div id="analyzeDialogStatus" style="font-size:13px;color:var(--muted);text-align:center">Starting…</div>
      </div>
      <div style="display:flex;justify-content:flex-end">
        <button onclick="document.getElementById('branchPickerOverlay').remove()" style="background:var(--bg3);color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:8px 18px;font-size:13px;cursor:pointer">Close</button>
      </div>`;

    await startIndexing(pickedBranch, auth);

    // Poll and update dialog with live phase labels
    const pollDialog = async () => {
      const dlg = document.getElementById('branchPickerOverlay');
      if (!dlg) return;
      const titleEl  = document.getElementById('analyzeDialogTitle');
      const statusEl = document.getElementById('analyzeDialogStatus');
      try {
        const r = await fetch(`/projects/status/${encodeURIComponent(currentProjectSlug)}`);
        if (r.ok) {
          const data = await r.json();

          if (data.error) {
            if (titleEl)  titleEl.textContent  = '❌ Failed';
            if (statusEl) { statusEl.textContent = data.error; statusEl.style.color = 'var(--red)'; }
            dlg.remove();
            showToast('Analysis error: ' + data.error, 'error');
            loadAnalyzeStatus();
            return;
          }

          if (data.indexed) {
            dlg.remove();
            showToast(`✅ ${currentProject} analyzed successfully!`);
            loadAnalyzeStatus();
            return;
          }

          // Map server status_msg → friendly phase label
          const msg = data.status_msg || '';
          let phase = '⏳ Working…';
          let detail = msg;
          if (msg.toLowerCase().includes('fetching')) {
            phase = '📡 Fetching branch…';
          } else if (msg.toLowerCase().includes('checking out') || msg.toLowerCase().includes('already on')) {
            phase = `🔀 Checking out ${pickedBranch}…`;
          } else if (data.indexing || msg.toLowerCase().includes('index')) {
            phase = '🧠 Analysing codebase…';
            detail = msg || `Scanning source files…`;
          } else if (msg.toLowerCase().includes('clone')) {
            phase = '🔄 Cloning…';
          }

          if (titleEl)  titleEl.textContent  = phase;
          if (statusEl) statusEl.textContent = detail || phase;
        }
      } catch {}
      setTimeout(pollDialog, 2000);
    };
    setTimeout(pollDialog, 1500);
  };
}

async function startIndexing(branch, auth) {
  const btn = document.getElementById('analyzeBtn');
  if (btn) { btn.disabled = true; btn.textContent = '🔀 Checking out…'; }
  updateAnalyzeBadge('indexing');

  try {
    const r = await fetch(`/projects/checkout/${encodeURIComponent(currentProjectSlug)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': auth },
      body: JSON.stringify({ branch: branch || 'master' })
    });
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    if (btn) btn.textContent = '🧠 Analysing…';
  } catch (err) {
    const overlay = document.getElementById('branchPickerOverlay');
    if (overlay) overlay.remove();
    if (btn) { btn.disabled = false; btn.textContent = '🧠 Retry'; }
    updateAnalyzeBadge('error', err.message);
    showToast('Failed: ' + err.message, 'error');
  }
}

function updateAnalyzeBadge(state, detail) {
  const badge = document.getElementById('analyzeStatusBadge');
  if (!badge) return;
  const map = {
    cloning:  ['🔄 Cloning…',   'rgba(79,142,247,0.15)',  'var(--accent)'],
    indexing: ['🔄 Analyzing…', 'rgba(79,142,247,0.15)',  'var(--accent)'],
    analyzed: ['🧠 Analyzed',   'rgba(61,220,132,0.15)',  'var(--green)'],
    error:    ['⚠️ Error',      'rgba(255,95,87,0.12)',   'var(--red)'],
  };
  const [text, bg, color] = map[state] || ['⚪', '', ''];
  badge.textContent = text;
  badge.style.background = bg;
  badge.style.color = color;
  if (detail) badge.title = detail;
}

// Settings modal
function openSettings() { window._settingsModal ? window._settingsModal.style.display='flex' : createSettingsModal(); }

function createSettingsModal() {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:9999';
  overlay.onclick = e => { if (e.target === overlay) overlay.style.display = 'none'; };

  const enabled = localStorage.getItem('auto_analyze_enabled') !== 'false';
  overlay.innerHTML = `
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:28px 32px;max-width:420px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.4)">
      <h3 style="margin:0 0 20px;font-size:17px">⚙️ Global Settings</h3>
      <label style="display:flex;align-items:center;gap:12px;cursor:pointer;font-size:14px">
        <input type="checkbox" id="toggleAutoAnalyze" ${enabled ? 'checked' : ''} style="width:18px;height:18px;cursor:pointer">
        <div>
          <div style="font-weight:600">🧠 Codebase Analysis</div>
          <div style="font-size:12px;color:var(--muted);margin-top:3px">Clone + index repos for better AI review context</div>
        </div>
      </label>
      <div style="margin-top:24px;text-align:right">
        <button onclick="this.closest('div[style*=fixed]').style.display='none'" style="background:var(--accent);color:white;border:none;border-radius:8px;padding:8px 20px;font-size:13px;font-weight:600;cursor:pointer">Done</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  window._settingsModal = overlay;

  document.getElementById('toggleAutoAnalyze').onchange = function() {
    localStorage.setItem('auto_analyze_enabled', this.checked ? 'true' : 'false');
    showToast(this.checked ? '🧠 Analysis enabled' : '🧠 Analysis disabled');
  };
}

init();
</script>
</body>
</html>
